<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Endogen</title>
<meta name="description" content="Endogen — Python, DLTs and AI">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a2e;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #e0e0e8;
    --text2: #8888a0;
    --border: #2a2a3e;
    --glow: rgba(108, 99, 255, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridShift 20s linear infinite;
    z-index: 0;
  }

  @keyframes gridShift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(60px, 60px); }
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    z-index: 0;
    animation: float 15s ease-in-out infinite;
  }
  .orb-1 { width: 300px; height: 300px; background: var(--accent); top: -100px; right: 10%; animation-delay: -5s; }
  .orb-2 { width: 250px; height: 250px; background: var(--accent2); bottom: -50px; left: 5%; animation-delay: -10s; }
  .orb-3 { width: 200px; height: 200px; background: #ff6b6b; top: 50%; left: 50%; animation-delay: -3s; opacity: 0.2; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 15px) scale(0.95); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 24px;
  }

  .profile {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 40px;
  }

  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    box-shadow: 0 0 30px var(--glow);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .avatar:hover {
    transform: scale(1.05);
    box-shadow: 0 0 50px var(--glow);
  }

  .profile-info h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .profile-info .bio {
    color: var(--text2);
    font-size: 1rem;
    margin-top: 4px;
  }

  .profile-info .meta {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--text2);
  }

  .meta span { display: flex; align-items: center; gap: 4px; }

  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    flex: 1;
    min-width: 120px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .stat:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent2);
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .repos {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    margin-bottom: 40px;
  }

  .repo {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .repo::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .repo:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .repo:hover::before { opacity: 1; }

  .repo-name {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .repo-desc {
    font-size: 0.82rem;
    color: var(--text2);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .repo-meta {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    font-size: 0.75rem;
    color: var(--text2);
  }

  .repo-meta span {
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .lang-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  /* Contributions */
  .contributions-wrapper {
    margin-bottom: 40px;
  }

  .contrib-summary {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 16px;
  }

  .contrib-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent2);
  }

  .contrib-label {
    font-size: 0.85rem;
    color: var(--text2);
  }

  .contrib-grid {
    display: grid;
    grid-template-columns: repeat(53, 1fr);
    gap: 3px;
    padding-bottom: 8px;
  }

  .contrib-week {
    display: grid;
    grid-template-rows: repeat(7, 1fr);
    gap: 3px;
  }

  .contrib-day {
    aspect-ratio: 1;
    border-radius: 2px;
    background: var(--bg3);
    transition: transform 0.15s;
    min-width: 0;
  }
  .contrib-day:hover {
    transform: scale(1.4);
    z-index: 1;
  }
  .contrib-day[data-level="1"] { background: #0e4429; }
  .contrib-day[data-level="2"] { background: #006d32; }
  .contrib-day[data-level="3"] { background: #26a641; }
  .contrib-day[data-level="4"] { background: #39d353; }

  .contrib-months {
    display: flex;
    font-size: 0.65rem;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 6px;
    gap: 3px;
  }

  .contrib-months span {
    flex-shrink: 0;
  }

  .contrib-legend {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    justify-content: flex-end;
    font-size: 0.65rem;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
  }

  .contrib-legend .contrib-day { width: 10px; height: 10px; cursor: default; }
  .contrib-legend .contrib-day:hover { transform: none; }

  .links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.3s;
  }
  .link:hover {
    border-color: var(--accent);
    background: var(--bg3);
    box-shadow: 0 0 20px var(--glow);
  }
  .link svg { width: 18px; height: 18px; fill: currentColor; }

  .footer {
    text-align: center;
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
  }

  .skeleton {
    background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @media (max-width: 600px) {
    .profile { flex-direction: column; text-align: center; }
    .profile-info .meta { justify-content: center; }
    .container { padding: 40px 16px; }
    .profile-info h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="container">
    <div class="profile">
      <a href="https://github.com/Endogen" target="_blank" rel="noopener">
        <img class="avatar" id="avatar" src="https://avatars.githubusercontent.com/u/226475?v=4" alt="Endogen">
      </a>
      <div class="profile-info">
        <h1 id="name">Endogen</h1>
        <div class="bio" id="bio">Focused on Python, DLTs and AI</div>
        <div class="meta">
          <span>📍 <span id="location">Germany</span></span>
          <span>👥 <span id="followers">—</span> followers</span>
          <span>📦 <span id="repos-count">—</span> repos</span>
        </div>
      </div>
    </div>

    <div class="stats" id="stats">
      <div class="stat">
        <div class="stat-value" id="stat-repos">—</div>
        <div class="stat-label">Repositories</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-stars">—</div>
        <div class="stat-label">Total Stars</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-followers">—</div>
        <div class="stat-label">Followers</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-years">—</div>
        <div class="stat-label">Years on GitHub</div>
      </div>
    </div>

    <div class="section-title">Featured Repositories</div>
    <div class="repos" id="repos-grid">
      <div class="repo skeleton" style="height:140px"></div>
      <div class="repo skeleton" style="height:140px"></div>
      <div class="repo skeleton" style="height:140px"></div>
      <div class="repo skeleton" style="height:140px"></div>
      <div class="repo skeleton" style="height:140px"></div>
      <div class="repo skeleton" style="height:140px"></div>
    </div>

    <div class="section-title">Contributions</div>
    <div class="contributions-wrapper">
      <div class="contrib-summary">
        <span class="contrib-count" id="contrib-total">—</span>
        <span class="contrib-label">contributions in the last 53 weeks</span>
      </div>
      <div class="contrib-grid" id="contrib-grid"></div>
      <div class="contrib-legend">
        <span>Less</span>
        <div class="contrib-day" data-level="0"></div>
        <div class="contrib-day" data-level="1"></div>
        <div class="contrib-day" data-level="2"></div>
        <div class="contrib-day" data-level="3"></div>
        <div class="contrib-day" data-level="4"></div>
        <span>More</span>
      </div>
    </div>

    <div class="section-title">Links</div>
    <div class="links">
      <a class="link" href="https://github.com/Endogen" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        GitHub
      </a>
      <a class="link" href="https://xian.technology" target="_blank" rel="noopener">
        <img src="https://xian.technology/favicon.png" alt="" width="18" height="18" style="border-radius:3px">
        Xian Technology
      </a>
    </div>

    <div class="footer">endogen.dev</div>
  </div>

<script>
(async () => {
  const LANG_COLORS = {
    Python:'#3572A5', JavaScript:'#f1e05a', TypeScript:'#3178c6',
    Rust:'#dea584', HTML:'#e34c26', CSS:'#563d7c', Shell:'#89e051',
    Swift:'#F05138', Go:'#00ADD8', Java:'#b07219', Kotlin:'#A97BFF',
    'C++':'#f34b7d', C:'#555555', Ruby:'#701516', PHP:'#4F5D95',
    Dart:'#00B4AB', Svelte:'#ff3e00', Vue:'#41b883',
  };

  try {
    const [userRes, reposRes] = await Promise.all([
      fetch('https://api.github.com/users/Endogen'),
      fetch('https://api.github.com/users/Endogen/repos?per_page=100&sort=updated'),
    ]);
    const user = await userRes.json();
    const allRepos = await reposRes.json();

    document.getElementById('name').textContent = user.name || user.login;
    document.getElementById('bio').textContent = user.bio || '';
    document.getElementById('location').textContent = user.location || '';
    document.getElementById('followers').textContent = user.followers;
    document.getElementById('repos-count').textContent = user.public_repos;
    document.getElementById('avatar').src = user.avatar_url;

    const totalStars = allRepos.reduce((s, r) => s + (r.stargazers_count || 0), 0);
    const years = new Date().getFullYear() - new Date(user.created_at).getFullYear();
    document.getElementById('stat-repos').textContent = user.public_repos;
    document.getElementById('stat-stars').textContent = totalStars;
    document.getElementById('stat-followers').textContent = user.followers;
    document.getElementById('stat-years').textContent = years;

    // Load featured repos from config, fall back to top-by-stars
    let featured;
    try {
      const pinnedRes = await fetch('/repos.json');
      const pinnedNames = await pinnedRes.json();
      const repoMap = Object.fromEntries(allRepos.map(r => [r.name, r]));
      featured = pinnedNames.map(n => repoMap[n]).filter(Boolean);
    } catch (e) {
      featured = [];
    }
    if (featured.length === 0) {
      featured = [...allRepos]
        .filter(r => !r.fork)
        .sort((a, b) => {
          if (b.stargazers_count !== a.stargazers_count) return b.stargazers_count - a.stargazers_count;
          return new Date(b.pushed_at) - new Date(a.pushed_at);
        })
        .slice(0, 6);
    }

    const grid = document.getElementById('repos-grid');
    grid.innerHTML = '';

    for (const repo of featured) {
      const lang = repo.language;
      const color = LANG_COLORS[lang] || '#8888a0';
      const a = document.createElement('a');
      a.className = 'repo';
      a.href = repo.html_url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `
        <div class="repo-name">${repo.name}</div>
        <div class="repo-desc">${repo.description || 'No description'}</div>
        <div class="repo-meta">
          ${lang ? `<span><span class="lang-dot" style="background:${color}"></span> ${lang}</span>` : ''}
          ${repo.stargazers_count > 0 ? `<span>★ ${repo.stargazers_count}</span>` : ''}
          ${repo.forks_count > 0 ? `<span>🍴 ${repo.forks_count}</span>` : ''}
        </div>
      `;
      grid.appendChild(a);
    }
    // Contribution graph — always 53 full weeks ending on today's weekday
    try {
      const API = 'https://github-contributions-api.jogruber.de/v4/Endogen';
      const now = new Date();
      const currentYear = now.getFullYear();

      // Fetch current + previous year to have enough data
      const [curRes, prevRes] = await Promise.all([
        fetch(`${API}?y=${currentYear}`),
        fetch(`${API}?y=${currentYear - 1}`),
      ]);
      const curData = await curRes.json();
      const prevData = await prevRes.json();

      // Merge into a date map
      const dayMap = {};
      for (const d of (prevData.contributions || [])) dayMap[d.date] = d;
      for (const d of (curData.contributions || [])) dayMap[d.date] = d;

      // Build exactly 53 weeks ending on today
      const totalWeeks = 53;
      const totalDays = totalWeeks * 7;
      const todayDow = now.getDay(); // 0=Sun
      // End of grid = end of today's week (Saturday)
      const endDate = new Date(now);
      endDate.setDate(endDate.getDate() + (6 - todayDow));
      // Start = 53 weeks before that Sunday
      const startDate = new Date(endDate);
      startDate.setDate(startDate.getDate() - totalDays + 1);

      const days = [];
      let totalContribs = 0;
      const d = new Date(startDate);
      for (let i = 0; i < totalDays; i++) {
        const key = d.toISOString().slice(0, 10);
        const entry = dayMap[key] || { date: key, count: 0, level: 0 };
        // Don't show future days
        if (d > now) {
          entry.count = -1; // marker for future
          entry.level = -1;
        } else {
          totalContribs += entry.count;
        }
        days.push(entry);
        d.setDate(d.getDate() + 1);
      }

      document.getElementById('contrib-total').textContent = totalContribs.toLocaleString();

      const grid = document.getElementById('contrib-grid');
      grid.innerHTML = '';

      // 53 full weeks, 7 days each — no gaps
      for (let w = 0; w < totalWeeks; w++) {
        const weekEl = document.createElement('div');
        weekEl.className = 'contrib-week';
        for (let dow = 0; dow < 7; dow++) {
          const day = days[w * 7 + dow];
          const dayEl = document.createElement('div');
          dayEl.className = 'contrib-day';
          if (day && day.level >= 0) {
            dayEl.setAttribute('data-level', day.level);
            dayEl.title = `${day.date}: ${day.count} contribution${day.count !== 1 ? 's' : ''}`;
          } else {
            // Future day — dim/invisible
            dayEl.style.opacity = '0.15';
          }
          weekEl.appendChild(dayEl);
        }
        grid.appendChild(weekEl);
      }
    } catch (e) {
      console.error('Failed to load contributions:', e);
    }

  } catch (e) {
    console.error('Failed to load GitHub data:', e);
  }
})();
</script>
</body>
</html>
